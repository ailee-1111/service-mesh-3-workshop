apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
---
apiVersion: kiali.io/v1alpha1
kind: Kiali
metadata:
  name: kiali
  namespace: istio-system
spec:
  auth:
    strategy: openshift
  deployment:
    namespace: istio-system
    cluster_wide_access: true
    pod_labels:
      sidecar.istio.io/inject: "false"
    view_only_mode: false
  external_services:
    grafana:
      enabled: false
    prometheus:
      auth:
        type: bearer
        use_kiali_token: true
      thanos_proxy:
        enabled: true
      url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
    tracing:
      auth:
        insecure_skip_verify: true
        type: bearer
        use_kiali_token: true
      enabled: true
      external_url: https://tempo-sample-gateway-tracing-system.YOUR_NEW_CLUSTER_SUBDOMAIN/api/traces/v1/north/search
      health_check_url: https://tempo-sample-gateway-tracing-system.YOUR_NEW_CLUSTER_SUBDOMAIN/api/traces/v1/north/tempo/api/echo
      internal_url: https://tempo-sample-gateway.tracing-system.svc.cluster.local:8080/api/traces/v1/north/tempo
      provider: tempo
      query_timeout: 60
      tempo_config:
        url_format: jaeger
      use_grpc: false
  installation_tag: "OpenShift Service Mesh"
  istio_namespace: istio-system
  server:
    write_timeout: 60
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kiali-monitoring-rbac-global
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
- kind: ServiceAccount
  name: kiali-service-account
  namespace: istio-system
