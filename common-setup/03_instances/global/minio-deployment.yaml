apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: tracing-system
spec:
  selector:
    matchLabels:
      app: minio
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: minio
    spec:
      initContainers:
      - name: create-buckets
        image: busybox:latest
        command:
        - sh
        - -c
        - mkdir -p /storage/tempo-data
        volumeMounts:
        - name: storage
          mountPath: /storage
      containers:
      - name: minio
        image: quay.io/minio/minio:latest
        args:
        - server
        - /storage
        env:
        - name: MINIO_ROOT_USER
          value: minio
        - name: MINIO_ROOT_PASSWORD
          value: minio123
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        volumeMounts:
        - name: storage
          mountPath: /storage
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: minio-pv-claim
