apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homeroom-console-reader
rules:
- apiGroups:
  - console.openshift.io
  resources:
  - consoleplugins
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - operator.openshift.io
  resources:
  - consoles
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - config.openshift.io
  resources:
  - consoles
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homeroom-console-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homeroom-console-reader
subjects:
- kind: Group
  name: system:serviceaccounts:homeroom
  apiGroup: rbac.authorization.k8s.io
