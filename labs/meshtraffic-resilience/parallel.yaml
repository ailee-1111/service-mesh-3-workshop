traffic:
  mode: "continuous"
  endpoint: "/reviews/1"
  duration: 5
  sleep: 0.1
  options:
    parallel_workers: 10

display:
  show_progress: true
  quiet_mode: false
  response_view: "extract"
  extract_json_path: ".reviews[0].rating.color"

analysis:
  expected_responses: ["white", "red", "black"]
  statistics:
    - "success_rate"
    - "response_distribution"
