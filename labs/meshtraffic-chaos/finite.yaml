traffic:
  mode: "finite"
  endpoint: "/reviews/1"
  count: 20
  sleep: 0.05
display:
  show_progress: true
  quiet_mode: false
  response_view: "smart_json"
analysis:
  enabled: true
  content_normalization: true
  expected_responses: ["No stars", "red", "black", "Ratings: ❌ Ratings service is currently unavailable"]
  statistics:
    - "success_rate"
    - "response_distribution"
