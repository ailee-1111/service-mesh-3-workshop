traffic:
  mode: "finite"
  endpoint: "/reviews/1"
  count: 20
  sleep: 0.05
display:
  show_progress: true
  quiet_mode: false
  response_view: "extract"
  extract_json_path: ".reviews[0].rating.color"
analysis:
  enabled: true
  content_normalization: true
  expected_responses: ["No stars", "red", "black"]
  statistics:
    - "success_rate"
    - "response_distribution"
