apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: ratings-vs
spec:
  hosts:
  - ratings.USER_NAME_PLACEHOLDER-meshtraffic-chaos.svc.cluster.local
  http:
  - match:
    - uri:
        prefix: /ratings
    fault:
      abort:
        httpStatus: 500
        percentage:
          value: 50.0
    route:
    - destination:
        host: ratings
        port:
          number: 9080
