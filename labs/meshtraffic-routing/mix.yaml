traffic:
  mode: "mix"
  count: 30
  items:
    - name: "reviews-v1"
      endpoint: "/reviews/1"

    - name: "reviews-v2"
      endpoint: "/reviews/1"
      headers:
        default: {"x-user-type": "beta"}

    - name: "reviews-v3"
      endpoint: "/reviews/1"
      headers:
        default: {"x-user-type": "internal"}

display:
  show_progress: true
  quiet_mode: false
  response_view: "extract"
  extract_json_path: ".reviews[0].rating.color"

analysis:
  enabled: true
  content_normalization: true
  expected_responses: ["No stars", "red", "black"]
  statistics:
    - "success_rate"
    - "response_distribution"
